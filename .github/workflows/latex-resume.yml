name: Compile LaTeX Resume

on:
  push:
    paths: # Only run when the LaTeX file changes
      - "_tabs/**.tex"
  workflow_dispatch: # Allows you to trigger it manually

jobs:
  build-resume:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          working_directory: _tabs

      - name: Move PDF to assets
        run: |
          mkdir -p assets
          mv _tabs/resume.pdf assets/resume.pdf

      - name: Commit and push generated PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-compile LaTeX resume to PDF"
          file_pattern: "assets/resume.pdf"

      - name: Trigger Jekyll Deploy Workflow via workflow_dispatch
        # This step explicitly triggers the 'Deploy Jekyll site to Pages' workflow
        # using the workflow_dispatch event after the resume PDF is updated.
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'jekyll.yml', // The filename of the Jekyll workflow
              ref: context.ref, // The branch to run the workflow on (e.g., 'main')
              inputs: {
                triggered_by: 'latex-resume-workflow',
                commit_sha: context.sha
              }
            });

# Permissions for the workflow
# 'contents: write' is needed for stefanzweifel/git-auto-commit-action to commit changes.
# 'actions: write' is needed for actions/github-script to dispatch another workflow.
permissions:
  contents: write
  actions: write
