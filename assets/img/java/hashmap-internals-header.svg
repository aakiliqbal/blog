<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">HashMap Internals in Java</title>
  <desc id="desc">A stylized HashMap diagram showing keys being hashed into buckets with collisions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#075985"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#dbeafe" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1030" cy="120" r="190" fill="#38bdf8" opacity="0.12"/>
  <circle cx="175" cy="545" r="230" fill="#f97316" opacity="0.12"/>

  <g opacity="0.12" stroke="#e0f2fe" stroke-width="1">
    <path d="M0 120H1280M0 240H1280M0 360H1280M0 480H1280"/>
    <path d="M160 0V640M320 0V640M480 0V640M640 0V640M800 0V640M960 0V640M1120 0V640"/>
  </g>

  <g transform="translate(78 82)">
    <text x="0" y="0" fill="#bae6fd" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="4">JAVA COLLECTIONS</text>
    <text x="0" y="76" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="74" font-weight="800">HashMap</text>
    <text x="0" y="148" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="74" font-weight="800">Internals</text>
    <text x="4" y="202" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28">hashCode() -> bucket index -> key/value node</text>
  </g>

  <g transform="translate(585 92)" filter="url(#shadow)">
    <rect x="0" y="0" width="560" height="456" rx="34" fill="url(#card)"/>
    <text x="42" y="68" fill="#0f172a" font-family="Consolas, Menlo, monospace" font-size="28" font-weight="700">table[]</text>

    <g font-family="Consolas, Menlo, monospace" font-size="22" font-weight="700">
      <rect x="42" y="104" width="150" height="58" rx="14" fill="#e2e8f0"/>
      <text x="73" y="141" fill="#334155">bucket 0</text>
      <rect x="42" y="178" width="150" height="58" rx="14" fill="#bae6fd"/>
      <text x="73" y="215" fill="#075985">bucket 1</text>
      <rect x="42" y="252" width="150" height="58" rx="14" fill="#e2e8f0"/>
      <text x="73" y="289" fill="#334155">bucket 2</text>
      <rect x="42" y="326" width="150" height="58" rx="14" fill="#fed7aa"/>
      <text x="73" y="363" fill="#9a3412">bucket 3</text>
    </g>

    <g stroke="#38bdf8" stroke-width="4" fill="none" marker-end="url(#arrow)">
      <path d="M192 207 C245 207 244 207 288 207"/>
      <path d="M192 355 C248 355 248 355 294 355"/>
      <path d="M408 355 C431 355 431 355 454 355"/>
    </g>

    <g font-family="Consolas, Menlo, monospace" font-size="19" font-weight="700">
      <rect x="292" y="178" width="146" height="58" rx="14" fill="#0284c7"/>
      <text x="318" y="214" fill="#ffffff">Node(A)</text>
      <rect x="292" y="326" width="116" height="58" rx="14" fill="#ea580c"/>
      <text x="316" y="362" fill="#ffffff">Node(B)</text>
      <rect x="454" y="326" width="116" height="58" rx="14" fill="#f97316"/>
      <text x="478" y="362" fill="#ffffff">Node(C)</text>
    </g>
  </g>

  <g transform="translate(92 377)" font-family="Consolas, Menlo, monospace" font-size="28" font-weight="700">
    <rect x="0" y="0" width="355" height="76" rx="22" fill="#0f172a" stroke="#38bdf8" stroke-width="3" opacity="0.92"/>
    <text x="28" y="48" fill="#e0f2fe">hash("Alice") = 1</text>
    <path d="M356 38 C440 12 450 -103 596 -150" stroke="#38bdf8" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  </g>

  <g transform="translate(110 484)" font-family="Consolas, Menlo, monospace" font-size="26" font-weight="700">
    <rect x="0" y="0" width="450" height="70" rx="22" fill="#0f172a" stroke="#fb923c" stroke-width="3" opacity="0.92"/>
    <text x="26" y="45" fill="#ffedd5">collision: Bob and Cat</text>
    <path d="M451 32 C535 22 430 -110 478 -130" stroke="#fb923c" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  </g>
</svg>
